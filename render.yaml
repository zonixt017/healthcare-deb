# ─────────────────────────────────────────────────────────────────────────────
# Render.com Configuration
# Deploy with: render blueprint deploy
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: healthcare-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    # Build configuration
    build:
      source: dockerfile
    
    # Deployment configuration
    plan: starter  # Options: starter, standard, pro
    region: oregon  # Options: oregon, frankfurt, singapore, ohio
    
    # Health check
    healthCheckPath: /
    
    # Environment variables
    envVars:
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: HF_INFERENCE_API
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: PDF_DATA_PATH
        value: data/
      - key: VECTOR_STORE_PATH
        value: vectorstore
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: RETRIEVER_K
        value: "4"
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EMBED_DEVICE
        value: cpu
    
    # Auto-deploy on push to main
    autoDeploy: true
    
    # Scaling (for standard plan and above)
    # numInstances: 1